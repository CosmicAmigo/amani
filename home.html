<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home - AMANI</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <div class="header">
        <div class="title">AMANI</div>
        <div class="subtitle">Dashboard</div>
      </div>
      <div class="content active" id="home">
        <button class="button highlight" onclick="openChat()">
          💬 Talk to AMANI
        </button>
        <button class="button counsellor-btn highlight" onclick="talkToCounsellor()">
          👤 Talk to a Counsellor
        </button>
        <button class="button" onclick="openProgress()">📊 My Progress</button>
        <button class="button" onclick="openFriendZone()">🤝 Friend Zone</button>
        <button class="button" onclick="openLobby()">🗣️ Community Lobby</button>
        <button class="button panic-btn highlight" onclick="activatePanic()">
          🆘 Panic Button
        </button>
      </div>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
