<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friends - AMANI</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <div class="header">
        <div class="title">AMANI</div>
        <div class="subtitle">Friend Zone</div>
      </div>
      <div class="content active" id="friendZone">
        <h3>Friend Zone</h3>
        <div id="friendsContainer">
          <p>Loading friends...</p>
        </div>
        <button class="button" onclick="goHome()">Back</button>
      </div>
    </div>
    <script type="module" src="./src/main.js"></script>
    <script>
      window.addEventListener("DOMContentLoaded", () => {
        if (window.loadUserFriends) {
          window.loadUserFriends();
        }
      });
    </script>
  </body>
</html>
