<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress - AMANI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="title">AMANI</div>
      <div class="subtitle">Progress</div>
    </div>
    <div class="content active" id="progress">
      <h3>Your Recovery Progress</h3>
      <div class="progress-card">
        <p>7-Day Streak</p>
        <div class="progress-bar">
          <div class="progress-fill" style="width: 70%"></div>
        </div>
      </div>
      <div class="progress-card">
        <p>Emotional Stability</p>
        <div class="progress-bar">
          <div class="progress-fill" style="width: 60%"></div>
        </div>
      </div>
      <div class="progress-card">
        <p>Community Engagement</p>
        <div class="progress-bar">
          <div class="progress-fill" style="width: 50%"></div>
        </div>
      </div>
      <button class="button" onclick="goHome()">Back</button>
    </div>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
