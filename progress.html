<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Progress - AMANI</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <div class="header">
        <div class="title"><img src="logo.png" alt="AMANI logo" class="logo" /></div>
        <div class="subtitle">Progress</div>
      </div>
      <div class="content active" id="progress">
        <h3>Your Abstinence Streaks</h3>
        <button class="button highlight" onclick="addNewStreak()">
          ➕ Start New Streak
        </button>
        <div id="streaksContainer">
          <p>Loading streaks...</p>
        </div>

        <h3>Recovery Progress</h3>
        <div id="progressContainer">
          <p>Loading progress data...</p>
        </div>

        <button class="button" onclick="goHome()">Back</button>
      </div>
    </div>
    <script type="module" src="./src/main.js"></script>
    <script>
      window.addEventListener("DOMContentLoaded", () => {
        if (window.loadUserStreaks) {
          window.loadUserStreaks();
        }
        if (window.loadUserProgress) {
          window.loadUserProgress();
        }
      });
    </script>
  </body>
</html>
